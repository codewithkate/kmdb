sources:
  - name: letterboxd
    description: "Data fresh from the source, not yet transformed or cleaned. This is the raw data as it was ingested into the data warehouse."
    database: analytics
    schema: fresh
    config:
      enabled: true
      event_time: my_time_field
      meta:
        owner: kc
        source: letterboxd
        model_maturity: in dev

    tables:
      - name: diary
        description: "{{ doc('letterboxd_source_diary') }}"
        config:
          enabled: true
          freshness:
            warn_after:  
              count: 7
              period: day
            error_after:
              count: 14
              period: day
          loaded_at_query: 'select to_timestamp(max("c8")) from {{ this }}'

        columns:
          - name: c1
            data_type: date
            description: "{{ doc('letterboxd_Entry_Date')}}"
          - name: c2
            data_type: varchar
            description: "{{ doc('letterboxd_Title')}}"
          - name: c3
            data_type: varchar
            description: "{{ doc('letterboxd_Release_Year')}}"
          - name: c4
            data_type: varchar
            description: "{{ doc('letterboxd_Letterboxd_URI')}}"
          - name: c5
            data_type: varchar
            description: "{{ doc('letterboxd_Rating')}}"
          - name: c6
            data_type: varchar
            description: "{{ doc('letterboxd_Rewatch')}}"
          - name: c7
            data_type: varchar
            description: "{{ doc('letterboxd_Tags')}}"
          - name: c8
            data_type: date
            description: "{{ doc('letterboxd_Watched_Date')}}"
          - name: c9
            data_type: date
            description: "Dropped in staging layer"


      - name: reviews
        description: "{[{doc('letterboxd_source_reviews')}]}"
        config:
          enabled: true
          freshness:
            warn_after:  
              count: 30
              period: day
          loaded_at_query: "select to_timestamp(max(date)) from {{ this }}"

        columns:
          - name: date
            data_type: date
            description: "{{ doc('letterboxd_Entry_Date')}}"
          - name: name
            data_type: varchar
            description: "{{ doc('letterboxd_Title')}}"
          - name: year
            data_type: number
            description: "{{ doc('letterboxd_Release_Year')}}"
          - name: letterboxduri
            data_type: varchar
            description: "{{ doc('letterboxd_Letterboxd_URI')}}"
          - name: rating
            data_type: number
            description: "{{ doc('letterboxd_Rating')}}"
          - name: rewatch
            data_type: boolean
            description: "{{ doc('letterboxd_Rewatch')}}"
          - name: review
            data_type: varchar
            description: "{{ doc('letterboxd_Review')}}"
          - name: tags
            data_type: varchar
            description: "{{ doc('letterboxd_Tags')}}"
          - name: watcheddate
            data_type: date
            description: "{{ doc('letterboxd_Watched_Date')}}"